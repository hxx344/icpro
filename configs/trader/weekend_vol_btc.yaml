# ============================================================
# Weekend Volatility Selling — BTC (Bybit Options)
# ============================================================
# 策略: 每周五 18:00 UTC 执行 BTC weekend vol
# 当前默认结构为裸双卖（`wing_delta: 0.0`）
#   - Short delta ≈ 0.45 (call + put)
#   - No wings (裸双卖)
#   - RV24 <= 1.2 才允许入场
#   - 固定张数下单
#   - 篮子止损: -200%
#   - 仅当 BTC 较开仓价单边波动 >= 5% 时才允许触发止损
#   - 持有至周日 08:00 UTC 自动结算
#
# 回测绩效 (2022-01 ~ 2024-12, $16,821 起始):
#   APR 321.1%  |  MaxDD 18.7%  |  Calmar 17.16
#   Sharpe 3.69 |  Win Rate 81.4%
# ============================================================

name: Weekend Vol BTC (Bybit Fixed Size)

exchange:
  api_key: ''                  # 或设置环境变量 BYBIT_API_KEY
  api_secret: ''               # 或设置环境变量 BYBIT_API_SECRET
  testnet: false
  base_url: ''                 # 留空自动选择 (prod: api.bybit.com)
  timeout: 15
  account_currency: USDT
  simulate_private: false      # 真实私有接口模式
  option_maker_fee_rate: 0.0002
  option_taker_fee_rate: 0.0003
  option_fee_cap_ratio: 0.07
  short_option_margin_ratio: 0.10
  short_option_otm_deduction_ratio: 0.08
  short_option_min_margin_ratio: 0.05

strategy:
  mode: weekend_vol
  underlying: BTC

  # Delta-based strike selection
  target_delta: 0.45           # |δ| for short legs (sell call / sell put)
  wing_delta: 0.0              # 0 = no wings, short strangle
  max_delta_diff: 0.15         # 容许实际 |δ| 偏离目标的最大值
  default_iv: 0.60             # fallback IV if mark_iv unavailable
  entry_realized_vol_lookback_hours: 24
  entry_realized_vol_max: 1.2  # annualized RV threshold
  stop_loss_pct: 200.0         # basket pnl% stop
  stop_loss_underlying_move_pct: 5.0  # 标的相对开仓价单边波动达到该百分比后，止损才允许触发

  # Entry timing
  entry_day: friday
  entry_time_utc: '18:00'      # Friday 18:00 UTC (optimized entry)

  # Position sizing
  leverage: 1.0                # 预览显示字段，固定数量模式下不再按权益放大
  quantity: 5.0                # 固定下单数量（张）
  max_positions: 1
  compound: false              # 兼容保留字段；当前仅固定数量模式

storage:
  db_path: ./data/trader_weekend_vol.db
  log_dir: ./logs
  log_level: INFO
  log_rotation: 1 day
  log_retention: 30 days

monitor:
  check_interval_sec: 5        # 每 5 秒检查一次
  heartbeat_interval_sec: 300  # 每 5 分钟心跳
  equity_snapshot_interval_sec: 1800  # 每 30 分钟快照 (周末交易时间短)
