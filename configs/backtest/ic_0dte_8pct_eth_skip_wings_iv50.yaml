# Iron Condor 0DTE ±8% ETH — IV < 50% 时跳过保护腿
backtest:
  name: "ETH IC 0DTE ±8% Skip Wings IV<50"
  start_date: "2025-03-14"
  end_date: "2026-03-14"
  time_step: "1h"
  underlying: "ETH"
  use_bs_only: false
  iv_mode: "proxy"
  iv_proxy_lookback_days: 30
  iv_smile_slope: 0.35
  iv_term_slope: 0.20
  iv_min: 0.05
  iv_max: 3.0

account:
  initial_balance: 1.0

execution:
  slippage: 0.0001
  taker_fee: 0.00024
  maker_fee: 0.00024
  min_fee: 0.00024
  max_fee_pct: 0.10
  delivery_fee: 0.00015
  delivery_fee_max_pct: 0.10

strategy:
  name: "ShortStrangle"
  params:
    quantity: 1.0
    min_days_to_expiry: 0.0
    max_days_to_expiry: 1.5
    roll_days_before_expiry: 0
    otm_pct: 0.01
    entry_hour: 8
    roll_daily: true
    compound: true
    take_profit_pct: 9999
    stop_loss_pct: 9999
    max_positions: 1
    hedge_otm_pct: 0.09
    wait_for_midpoint: false
    skip_wings_below_iv: 50

report:
  output_dir: "./reports/ic_0dte_skip_wings"
