backtest:
  name: "ETH Call Spread CC - 1DTE"
  start_date: "2025-12-13"
  end_date: "2026-03-13"
  time_step: "1h"
  underlying: "ETH"
  use_bs_only: false
  iv_mode: "proxy"
  fixed_iv: 0.60
  dvol_path: ""
  iv_proxy_lookback_days: 30
  iv_smile_slope: 0.35
  iv_term_slope: 0.20
  iv_min: 0.05
  iv_max: 3.0

account:
  initial_balance: 1.0

execution:
  slippage: 0.0001
  taker_fee: 0.0003
  maker_fee: 0.0002
  min_fee: 0.0003
  max_fee_pct: 0.125
  delivery_fee: 0.00015

strategy:
  name: "CallSpreadCC"
  params:
    quantity: 1.0
    min_dte: 1.0           # DTE > 1
    max_dte: 2.5           # DTE <= 2.5 天
    entry_hour: 8          # 08:00 UTC 开仓
    roll_daily: false       # 不每日滚仓,让合约自然到期后再开新仓
    roll_threshold_pct: 0.0
    compound: true
    spread_width_pct: 0.15

report:
  output_dir: "./reports"
