backtest:
  name: "ETH Call Spread CC (OKX Compound - Real Data)"
  start_date: "2025-12-13"
  end_date: "2026-03-13"
  time_step: "1h"
  underlying: "ETH"
  use_bs_only: false       # 浣跨敤 OKX 鐪熷疄琛屾儏鏁版嵁
  iv_mode: "proxy"
  fixed_iv: 0.60
  dvol_path: ""
  iv_proxy_lookback_days: 30
  iv_smile_slope: 0.35
  iv_term_slope: 0.20
  iv_min: 0.05
  iv_max: 3.0

account:
  initial_balance: 1.0  # ETH (鍚屾椂瑙嗕负鎸佹湁 1 ETH 鐜拌揣澶囧厬)

execution:
  slippage: 0.0001       # 鍥哄畾婊戠偣 (ETH)
  taker_fee: 0.0003      # 0.03% of underlying (OKX 璐圭巼)
  maker_fee: 0.0002      # 0.02% of underlying (OKX maker)
  min_fee: 0.0003        # 鏈€灏忔墜缁垂 (ETH)
  max_fee_pct: 0.125
  delivery_fee: 0.00015

strategy:
  name: "CallSpreadCC"
  params:
    quantity: 1.0
    min_dte: 7.0
    max_dte: 0.0
    roll_daily: true
    roll_threshold_pct: 0.10
    compound: true
    spread_width_pct: 0.15

report:
  output_dir: "./reports"



