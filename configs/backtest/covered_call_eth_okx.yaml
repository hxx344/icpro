backtest:
  name: "ETH Covered Call (OKX 3M)"
  start_date: "2025-12-13"
  end_date: "2026-03-13"
  time_step: "1h"
  underlying: "ETH"
  use_bs_only: false       # 使用 OKX 真实行情数据
  iv_mode: "proxy"
  fixed_iv: 0.60
  dvol_path: ""
  iv_proxy_lookback_days: 30
  iv_smile_slope: 0.35
  iv_term_slope: 0.20
  iv_min: 0.05
  iv_max: 3.0

account:
  initial_balance: 1.0  # ETH (同时视为持有 1 ETH 现货备兑)

execution:
  slippage: 0.0001       # 固定滑点 (ETH)
  taker_fee: 0.0003      # 0.03% of underlying (OKX 费率)
  maker_fee: 0.0002      # 0.02% of underlying (OKX maker 更低)
  min_fee: 0.0003
  max_fee_pct: 0.125
  delivery_fee: 0.00015

strategy:
  name: "CoveredCall"
  params:
    quantity: 1.0         # 每次卖出 1 张 call (备兑 1 ETH 现货)
    min_dte: 0.0          # 0-DTE: 卖当天到期合约
    roll_daily: true      # 每天滚仓

report:
  output_dir: "./reports"
