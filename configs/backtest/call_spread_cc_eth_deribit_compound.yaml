backtest:
  name: "ETH Call Spread CC (Deribit Compound)"
  start_date: "2025-12-13"
  end_date: "2026-03-13"
  time_step: "1h"
  underlying: "ETH"
  use_bs_only: false
  iv_mode: "proxy"
  fixed_iv: 0.60
  dvol_path: ""
  iv_proxy_lookback_days: 30
  iv_smile_slope: 0.35
  iv_term_slope: 0.20
  iv_min: 0.05
  iv_max: 3.0

account:
  initial_balance: 1.0

execution:
  slippage: 0.0001
  taker_fee: 0.0003      # Deribit 0.03% of underlying
  maker_fee: 0.0002
  min_fee: 0.0003
  max_fee_pct: 0.125
  delivery_fee: 0.00015

strategy:
  name: "CallSpreadCC"
  params:
    quantity: 1.0
    min_dte: 1.0           # 短期期权 (1天+)
    max_dte: 14.0          # 最多14天到期
    roll_daily: true
    roll_threshold_pct: 0.10
    compound: true
    spread_width_pct: 0.15

report:
  output_dir: "./reports"
