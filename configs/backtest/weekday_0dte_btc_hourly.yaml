# BTC Weekday 0DTE Iron Condor — Mon-Fri only, real hourly data
# 与 Weekend Vol 互补: 周一至周五每天 08:00 UTC 开仓, 次日 08:00 到期结算
backtest:
  name: "BTC Weekday 0DTE IC (Mon-Fri)"
  start_date: "2023-03-01"
  end_date: "2026-01-31"
  time_step: "1h"
  underlying: "BTC"
  margin_mode: "USD"
  use_bs_only: false
  option_data_source: "options_hourly"
  option_snapshot_pick: "close"
  iv_mode: "fixed"
  fixed_iv: 0.60

account:
  initial_balance: 1.0

execution:
  slippage: 0.0001
  taker_fee: 0.00024
  maker_fee: 0.00024
  min_fee: 0.00024
  max_fee_pct: 0.10
  delivery_fee: 0.00015
  delivery_fee_max_pct: 0.10

strategy:
  name: "ShortStrangle"
  params:
    quantity: 1.0
    min_days_to_expiry: 0.0      # 0DTE: 当天/次日到期
    max_days_to_expiry: 1.5      # 捕捉次日 08:00 到期的合约
    roll_days_before_expiry: 0   # 不提前平仓, 让到期自动结算
    otm_pct: 0.05                # 5% OTM (Call K ≈ S×1.05, Put K ≈ S×0.95)
    entry_hour: 8                # 每日 08:00 UTC 开仓 (Deribit 结算时间)
    roll_daily: true             # 每日滚仓模式
    compound: true               # 复利
    take_profit_pct: 9999         # 禁用止盈, 让期权自然到期
    stop_loss_pct: 9999            # 禁用止损, 避免锁定临时亏损
    max_positions: 1             # 最多 1 对
    hedge_otm_pct: 0.10          # 10% OTM 买保护翅膀 → Iron Condor
    skip_weekends: true          # 周六/周日不交易

report:
  output_dir: "./reports/weekday_0dte_btc"
