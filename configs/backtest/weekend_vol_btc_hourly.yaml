# BTC Weekend Vol Iron Condor — native hourly options snapshots
backtest:
  name: "BTC Weekend Vol Hourly (Full Range)"
  start_date: "2023-03-01"
  end_date: "2026-03-24"
  time_step: "1h"
  underlying: "BTC"
  margin_mode: "USD"
  use_bs_only: false
  option_data_source: "options_hourly"
  option_snapshot_pick: "close"
  iv_mode: "fixed"
  fixed_iv: 0.60
  show_progress: false

account:
  initial_balance: 1.0

execution:
  slippage: 0.0001
  taker_fee: 0.00024
  maker_fee: 0.00024
  min_fee: 0.00024
  max_fee_pct: 0.10
  delivery_fee: 0.00015
  delivery_fee_max_pct: 0.10

strategy:
  name: "WeekendVol"
  params:
    target_delta: 0.40
    wing_delta: 0.05
    default_iv: 0.60
    entry_day: "friday"
    entry_time_utc: "16:00"
    close_day: "sunday"
    close_time_utc: "08:00"
    expire_day: "sunday"
    expiry_selection: "first_after_close"
    leverage: 3.0
    quantity: 0.1
    quantity_step: 0.1
    max_positions: 1
    compound: true
    max_delta_diff: 0.20
    expiry_tolerance_hours: 12

report:
  output_dir: "./reports/weekend_vol_hourly_proxy"
  generate_plots: false