backtest:
  name: "BTC Covered Call"
  start_date: "2025-01-01"
  end_date: "2025-12-31"
  time_step: "1h"
  underlying: "BTC"
  use_bs_only: true
  iv_mode: "proxy"
  fixed_iv: 0.60
  dvol_path: ""
  iv_proxy_lookback_days: 30
  iv_smile_slope: 0.35
  iv_term_slope: 0.20
  iv_min: 0.05
  iv_max: 3.0

account:
  initial_balance: 1.0  # BTC (同时视为持有 1 BTC 现货备兑)

execution:
  slippage: 0.0001       # 固定滑点 (BTC)
  taker_fee: 0.0003      # 0.03% of underlying
  maker_fee: 0.0003      # 0.03% of underlying
  min_fee: 0.0003        # 最小手续费 (BTC)
  max_fee_pct: 0.125     # 最大手续费 (合约价值的 12.5%)
  delivery_fee: 0.00015  # 交割手续费 0.015%

strategy:
  name: "CoveredCall"
  params:
    quantity: 1.0         # 每次卖出 1 张 call (备兑 1 BTC 现货)
    min_dte: 0.0          # 0-DTE: 卖当天到期合约, 利用到期结算降低手续费
    roll_daily: true      # 每天滚仓 (平旧开新)

report:
  output_dir: "./reports"
