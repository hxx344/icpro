# Iron Condor 0DTE ±3% — 使用 CDD 真实日频数据 (2023-2025)
backtest:
  name: "BTC IC 0DTE W3% CDD Real Data"
  start_date: "2023-01-01"
  end_date: "2025-12-31"
  time_step: "1d"
  underlying: "BTC"
  margin_mode: "USD"
  use_bs_only: false
  iv_mode: "proxy"
  iv_proxy_lookback_days: 30
  iv_smile_slope: 0.35
  iv_term_slope: 0.20
  iv_min: 0.05
  iv_max: 3.0

account:
  initial_balance: 1.0

execution:
  slippage: 0.0001
  taker_fee: 0.0003
  maker_fee: 0.0002
  min_fee: 0.0003
  max_fee_pct: 0.125
  delivery_fee: 0.00015

strategy:
  name: "ShortStrangle"
  params:
    quantity: 1.0
    min_days_to_expiry: 0.0
    max_days_to_expiry: 1.5
    roll_days_before_expiry: 0
    otm_pct: 0.0
    entry_hour: 8
    roll_daily: true
    compound: true
    take_profit_pct: 9999
    stop_loss_pct: 9999
    max_positions: 1
    hedge_otm_pct: 0.03
    wait_for_midpoint: false

report:
  output_dir: "./reports/ic_0dte_cdd"
