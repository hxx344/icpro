backtest:
  name: "ETH Short Strangle 0DTE"
  start_date: "2025-12-13"
  end_date: "2026-03-13"
  time_step: "1h"
  underlying: "ETH"
  use_bs_only: false
  iv_mode: "proxy"
  fixed_iv: 0.60
  dvol_path: ""
  iv_proxy_lookback_days: 30
  iv_smile_slope: 0.35
  iv_term_slope: 0.20
  iv_min: 0.05
  iv_max: 3.0

account:
  initial_balance: 1.0       # 1 ETH

execution:
  slippage: 0.0001
  taker_fee: 0.0003
  maker_fee: 0.0002
  min_fee: 0.0003
  max_fee_pct: 0.125
  delivery_fee: 0.00015

strategy:
  name: "ShortStrangle"
  params:
    quantity: 1.0
    min_days_to_expiry: 0.0    # 0DTE: 当天到期
    max_days_to_expiry: 1.5    # 捕捉次日 08:00 到期的合约
    roll_days_before_expiry: 0  # 不提前滚仓，让到期自动结算
    otm_pct: 0.05              # 5% OTM（Call K ≈ S×1.05, Put K ≈ S×0.95）
    entry_hour: 8              # 每日 08:00 UTC 开仓
    roll_daily: true           # 每日滚仓
    compound: true             # 复利
    take_profit_pct: 80        # 单腿 80% 利润止盈
    stop_loss_pct: 300         # 单腿 300% 止损
    max_positions: 1           # 最多 1 对

report:
  output_dir: "./reports"
